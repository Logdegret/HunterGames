<!doctype html>
<html lang="en-us">
  <head>
    <script src="coi-serviceworker.min.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Open Golf Online</title>
    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(17, 23, 24, .88);
        --panel-solid: #141b1d;
        --line: rgba(175, 194, 190, .22);
        --text: #f5f7f4;
        --muted: #b5c4bf;
        --green: #52e39a;
        --amber: #ffc857;
        --cyan: #65d6ff;
        --danger: #ff6b78;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .game {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #000;
        image-rendering: optimizeSpeed;
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }

      .party-panel {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 20;
        display: grid;
        gap: 10px;
        width: min(360px, calc(100vw - 28px));
        max-height: calc(100vh - 28px);
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
        box-shadow: 0 24px 90px rgba(0, 0, 0, .46);
        backdrop-filter: blur(14px);
      }

      .party-panel.is-compact {
        width: auto;
        min-width: 250px;
        overflow: visible;
      }

      .party-panel.is-compact .panel-body {
        display: none;
      }

      .panel-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 8px;
        align-items: center;
      }

      .title {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: 22px;
        line-height: 1;
      }

      h2 {
        margin-bottom: 8px;
        font-size: 15px;
      }

      .subtle {
        margin-bottom: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .status {
        display: inline-flex;
        min-height: 32px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        white-space: nowrap;
      }

      .status.online {
        border-color: rgba(82, 227, 154, .74);
        color: var(--green);
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 36px;
        height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, .04);
        color: var(--text);
        cursor: pointer;
      }

      .icon-button:hover,
      button:hover {
        border-color: var(--cyan);
      }

      .panel-body {
        display: grid;
        gap: 10px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(8, 12, 13, .58);
        padding: 10px;
      }

      .room-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .room-grid .field:first-child {
        grid-column: 1 / -1;
      }

      .field {
        display: grid;
        gap: 5px;
      }

      label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, .42);
        color: var(--text);
        padding: 0 10px;
        outline: none;
      }

      input:focus {
        border-color: var(--cyan);
        box-shadow: 0 0 0 3px rgba(101, 214, 255, .16);
      }

      .actions,
      .score-actions,
      .copy-row,
      .chat-form {
        display: flex;
        gap: 8px;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, .06);
        color: var(--text);
        padding: 0 11px;
        font-weight: 900;
        cursor: pointer;
      }

      button.primary {
        border-color: transparent;
        background: var(--green);
        color: #06100c;
      }

      button.warn {
        border-color: rgba(255, 200, 87, .62);
        color: var(--amber);
      }

      .copy-row input,
      .chat-form input {
        flex: 1;
        min-width: 0;
      }

      .players {
        display: grid;
        gap: 6px;
      }

      .player {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 8px;
      }

      .player strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .player span {
        color: var(--muted);
        font-size: 12px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 6px;
        text-align: left;
      }

      th {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      td:last-child,
      th:last-child {
        text-align: right;
      }

      .score-input {
        width: 54px;
        min-height: 28px;
        text-align: center;
      }

      .chat-log {
        display: grid;
        align-content: start;
        gap: 6px;
        min-height: 92px;
        max-height: 140px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(0, 0, 0, .34);
        padding: 8px;
      }

      .chat-line {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .chat-line strong {
        color: var(--text);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 16px;
        z-index: 30;
        transform: translate(-50%, 16px);
        opacity: 0;
        pointer-events: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(8, 12, 13, .9);
        color: var(--text);
        padding: 9px 12px;
        transition: opacity .18s ease, transform .18s ease;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @media (max-width: 760px) {
        .party-panel {
          top: auto;
          right: 10px;
          left: 10px;
          bottom: 10px;
          width: auto;
          max-height: 54vh;
        }

        .party-panel.is-compact {
          left: auto;
          min-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <canvas class="game" id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <aside class="party-panel is-compact" id="partyPanel" aria-label="Multiplayer party room">
      <section class="panel-head">
        <div class="title">
          <h1>Open Golf</h1>
          <p class="subtle">Party rooms</p>
        </div>
        <span class="status" id="status">Offline</span>
        <button class="icon-button" id="panelToggle" type="button" aria-label="Toggle party panel" title="Toggle party panel">≡</button>
      </section>

      <div class="panel-body">
        <section class="card">
          <h2>Room</h2>
          <div class="room-grid">
            <div class="field">
              <label for="serverInput">Server</label>
              <input id="serverInput" placeholder="wss://hunter-open-golf.logankao99.workers.dev">
            </div>
            <div class="field">
              <label for="nameInput">Name</label>
              <input id="nameInput" maxlength="18" placeholder="Player">
            </div>
            <div class="field">
              <label for="roomInput">Room</label>
              <input id="roomInput" maxlength="12" placeholder="PARTY">
            </div>
          </div>
          <div class="actions" style="margin-top: 8px">
            <button class="primary" id="joinBtn" type="button">Join</button>
            <button id="newRoomBtn" type="button">New</button>
            <button id="leaveBtn" type="button">Leave</button>
          </div>
        </section>

        <section class="card">
          <h2>Share</h2>
          <div class="copy-row">
            <input id="shareLink" readonly value="Join a room first">
            <button id="copyBtn" type="button">Copy</button>
          </div>
        </section>

        <section class="card">
          <h2>Players</h2>
          <div class="players" id="players"></div>
        </section>

        <section class="card">
          <h2>Scorecard</h2>
          <div class="score-actions">
            <button id="prevHoleBtn" type="button">Prev</button>
            <button id="nextHoleBtn" type="button">Next</button>
            <button class="warn" id="resetBtn" type="button">Reset</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>Player</th>
                <th id="holeLabel">Hole 1</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody id="scoreRows"></tbody>
          </table>
        </section>

        <section class="card">
          <h2>Chat</h2>
          <div class="chat-log" id="chatLog"></div>
          <form class="chat-form" id="chatForm">
            <input id="chatInput" maxlength="160" placeholder="Nice shot">
            <button type="submit">Send</button>
          </form>
        </section>
      </div>
    </aside>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="text/javascript">
      const DEFAULT_SERVER = "wss://hunter-open-golf.logankao99.workers.dev";
      const HOLES = 18;
      const playerId = localStorage.getItem("openGolfPlayerId") || crypto.randomUUID();
      localStorage.setItem("openGolfPlayerId", playerId);

      const els = {
        panel: document.querySelector("#partyPanel"),
        panelToggle: document.querySelector("#panelToggle"),
        status: document.querySelector("#status"),
        serverInput: document.querySelector("#serverInput"),
        nameInput: document.querySelector("#nameInput"),
        roomInput: document.querySelector("#roomInput"),
        joinBtn: document.querySelector("#joinBtn"),
        newRoomBtn: document.querySelector("#newRoomBtn"),
        leaveBtn: document.querySelector("#leaveBtn"),
        shareLink: document.querySelector("#shareLink"),
        copyBtn: document.querySelector("#copyBtn"),
        players: document.querySelector("#players"),
        holeLabel: document.querySelector("#holeLabel"),
        scoreRows: document.querySelector("#scoreRows"),
        prevHoleBtn: document.querySelector("#prevHoleBtn"),
        nextHoleBtn: document.querySelector("#nextHoleBtn"),
        resetBtn: document.querySelector("#resetBtn"),
        chatLog: document.querySelector("#chatLog"),
        chatForm: document.querySelector("#chatForm"),
        chatInput: document.querySelector("#chatInput"),
        toast: document.querySelector("#toast")
      };

      let socket = null;
      let toastTimer = 0;
      let roomState = { hole: 1, players: [], scores: {}, chat: [] };

      const params = new URLSearchParams(location.search);
      els.serverInput.value = params.get("server") || localStorage.getItem("openGolfServer") || DEFAULT_SERVER;
      els.nameInput.value = params.get("name") || localStorage.getItem("openGolfName") || `Player ${String(playerId).slice(0, 4)}`;
      els.roomInput.value = cleanRoom(params.get("room") || localStorage.getItem("openGolfRoom") || "PARTY");
      if (params.get("panel") === "open") els.panel.classList.remove("is-compact");

      window.openGolfLocalShot = (message) => {
        send({
          type: "shot",
          level: message.level,
          stroke: message.stroke,
          position: message.position,
          velocity: message.velocity
        });
      };

      window.openGolfHoleFinished = (message) => {
        send({
          type: "holeFinished",
          level: message.level,
          strokes: message.strokes
        });
      };

      render();
      if (els.serverInput.value) joinRoom();

      els.panelToggle.addEventListener("click", () => {
        els.panel.classList.toggle("is-compact");
      });
      els.joinBtn.addEventListener("click", joinRoom);
      els.leaveBtn.addEventListener("click", leaveRoom);
      els.newRoomBtn.addEventListener("click", () => {
        els.roomInput.value = Math.random().toString(36).slice(2, 8).toUpperCase();
        joinRoom();
      });
      els.copyBtn.addEventListener("click", async () => {
        if (!els.shareLink.value || els.shareLink.value === "Join a room first") return;
        await navigator.clipboard.writeText(els.shareLink.value);
        showToast("Invite link copied");
      });
      els.prevHoleBtn.addEventListener("click", () => send({ type: "setHole", hole: Math.max(1, Number(roomState.hole || 1) - 1) }));
      els.nextHoleBtn.addEventListener("click", () => send({ type: "setHole", hole: Math.min(HOLES, Number(roomState.hole || 1) + 1) }));
      els.resetBtn.addEventListener("click", () => send({ type: "resetScores" }));
      els.chatForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = els.chatInput.value.trim();
        if (!text) return;
        send({ type: "chat", text });
        els.chatInput.value = "";
      });

      function joinRoom() {
        const server = normalizeServer(els.serverInput.value);
        const room = cleanRoom(els.roomInput.value);
        const name = cleanName(els.nameInput.value);
        if (!server) {
          setStatus("No server", false);
          els.serverInput.focus();
          return;
        }
        leaveRoom();
        localStorage.setItem("openGolfServer", server);
        localStorage.setItem("openGolfRoom", room);
        localStorage.setItem("openGolfName", name);
        els.serverInput.value = server;
        els.roomInput.value = room;
        els.nameInput.value = name;
        const url = `${server.replace(/\/$/, "")}/room/${encodeURIComponent(room)}?player=${encodeURIComponent(playerId)}&name=${encodeURIComponent(name)}`;
        socket = new WebSocket(url);
        setStatus("Joining", false);
        socket.addEventListener("open", () => {
          setStatus("Online", true);
          showToast(`Joined ${room}`);
        });
        socket.addEventListener("message", (event) => {
          const message = JSON.parse(event.data);
          if (message.type === "state") {
            roomState = message.state;
            render();
          }
          if (message.type === "shot" && message.playerId !== playerId) {
            applyRemoteShot(message);
          }
        });
        socket.addEventListener("close", () => setStatus("Offline", false));
        socket.addEventListener("error", () => setStatus("Error", false));
      }

      function leaveRoom() {
        if (socket) socket.close();
        socket = null;
        setStatus("Offline", false);
      }

      function send(message) {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        socket.send(JSON.stringify(message));
      }

      function applyRemoteShot(message) {
        if (!window.Module?.ccall) {
          setTimeout(() => applyRemoteShot(message), 600);
          return;
        }
        const position = message.position || {};
        const velocity = message.velocity || {};
        window.Module.ccall(
          "golf_multiplayer_apply_remote_shot",
          null,
          ["number", "number", "number", "number", "number", "number", "number"],
          [
            Number(position.x) || 0,
            Number(position.y) || 0,
            Number(position.z) || 0,
            Number(velocity.x) || 0,
            Number(velocity.y) || 0,
            Number(velocity.z) || 0,
            Number(message.stroke) || 1
          ]);
        showToast(`${message.name || "Player"} took a shot`);
      }

      function render() {
        const players = roomState.players || [];
        const scores = roomState.scores || {};
        const hole = Number(roomState.hole || 1);
        els.holeLabel.textContent = `Hole ${hole}`;
        els.players.innerHTML = players.length ? players.map((player) => `
          <div class="player">
            <strong>${escapeHtml(player.name)}</strong>
            <span>${player.online ? "online" : "away"}</span>
          </div>
        `).join("") : `<p class="subtle">No one has joined yet.</p>`;

        els.scoreRows.innerHTML = players.map((player) => {
          const playerScores = scores[player.id] || {};
          const total = totalScore(playerScores);
          const value = playerScores[String(hole)] || "";
          return `
            <tr>
              <td>${escapeHtml(player.name)}</td>
              <td>${player.id === playerId ? `<input class="score-input" type="number" min="1" max="99" value="${escapeHtml(value)}" data-hole="${hole}">` : escapeHtml(value || "-")}</td>
              <td>${total || "-"}</td>
            </tr>
          `;
        }).join("");

        document.querySelectorAll(".score-input").forEach((input) => {
          input.addEventListener("change", () => {
            send({ type: "setScore", hole: Number(input.dataset.hole), strokes: Number(input.value) || 0 });
          });
        });

        els.chatLog.innerHTML = (roomState.chat || []).slice(-18).map((line) => `
          <div class="chat-line"><strong>${escapeHtml(line.name)}:</strong> ${escapeHtml(line.text)}</div>
        `).join("") || `<div class="chat-line">Chat appears here.</div>`;
        els.chatLog.scrollTop = els.chatLog.scrollHeight;

        const server = normalizeServer(els.serverInput.value);
        const room = cleanRoom(els.roomInput.value);
        const panel = els.panel.classList.contains("is-compact") ? "" : "&panel=open";
        els.shareLink.value = server
          ? `${location.origin}${location.pathname}?server=${encodeURIComponent(server)}&room=${encodeURIComponent(room)}${panel}`
          : "Join a room first";
      }

      function setStatus(text, online) {
        els.status.textContent = text;
        els.status.classList.toggle("online", online);
      }

      function showToast(message) {
        clearTimeout(toastTimer);
        els.toast.textContent = message;
        els.toast.classList.add("show");
        toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1800);
      }

      function cleanRoom(value) {
        return String(value || "PARTY").toUpperCase().replace(/[^A-Z0-9-]/g, "").slice(0, 12) || "PARTY";
      }

      function cleanName(value) {
        return String(value || "Player").replace(/[<>]/g, "").trim().slice(0, 18) || "Player";
      }

      function normalizeServer(value) {
        const text = String(value || "").trim().replace(/\/$/, "");
        if (!text) return "";
        if (text.startsWith("wss://") || text.startsWith("ws://")) return text;
        if (text.startsWith("https://")) return `wss://${text.slice(8)}`;
        if (text.startsWith("http://")) return `ws://${text.slice(7)}`;
        return `wss://${text}`;
      }

      function totalScore(playerScores) {
        return Object.values(playerScores).reduce((sum, value) => sum + (Number(value) || 0), 0);
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      var Module = {
        preRun: [],
        postRun: [],
        print: (function() {
            return function(text) {
                text = Array.prototype.slice.call(arguments).join(' ');
                console.log(text);
            };
        })(),
        printErr: function(text) {
            text = Array.prototype.slice.call(arguments).join(' ');
            console.error(text);
        },
        canvas: (function() {
            var canvas = document.getElementById('canvas');
            return canvas;
        })(),
        setStatus: function(text) {
            console.log("status: " + text);
        },
        monitorRunDependencies: function(left) {
            console.log("monitor run deps: " + left);
        }
      };
      window.onerror = function(event) {
        console.log("onerror: " + event.message);
      };
    </script>
    <script async type="text/javascript" src="golf.js"></script>
  </body>
</html>
